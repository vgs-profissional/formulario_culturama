<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta id="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>

<body>
    <header>
        <h1>Pesquisa Online </h1>
    </header>
    <section>
        <!-- Dados pessoais -->
        <form action="" method="get">
            <fieldset>
                <legend>
                    Dados pessoais
                </legend>
                <label for="id">Nome</label>
                <!-- for para saber de que input ele é rótulo -->
                <input type="text" id="userid" name="userName" required>
                <br>
                <!-- type para o tipo de dado n ser diferente do esperado
                    id ou name para definir a função do input 
                    required para ser obritório-->
                <label for="age">Idade</label>
                <input type="number" id="age" name="age" min="12" max="100" required>
                <!-- máximo e minimo que aceita -->
                <br>
                <label for="birthDate">Data de nascimento</label>
                <input type="date" id="birthDate" name="userBirthdate">
                <!-- tipo date para datas -->
                <br>
                <label for="email">Email</label>
                <input type="email" id="email" name="userEmail" required>
                <br>
                <label for="phoneNumber">Telefone</label>
                <input type="tel" id="phoneNumber" name="userPhoneNumber" placeholder="DDD + número sem espaço ou hífen"
                    pattern="[0-9]{11}" required>
                <!-- telefone com padrão numeros de 0 a 9 e 11 digitos
                        placeholder pra aparecer texto dentro do input-->
                <br>
                <label for="image">Upload de foto</label>
                <input type="file" id="image" name="userImage" accept="image/*">
                <!-- accept pra dizer que tipo de arquivo aceita -->
                <br>
            </fieldset>

            <fieldset>
                <legend>Perfil</legend>
                <p>Genêro:</p>
                <input type="radio" name="userGender" value="Masculino" id="mas">
                <label for="mas">Masculino</label>
                <input type="radio" name="userGender" value="Feminino" id="fem">
                <label for="fem">Feminino</label>
                <input type="radio" name="userGender" value="notInformed" id="notInformed">
                <label for="notInformed">Prefiro não informar</label>
                <br>
                <label for="maritalStatus">Estado Civil:</label>
                <select id="maritalStatus" name="userMaritalStatus">
                    <option value="notInformed">Selecionar</option>
                    <option value="Casado(a)">Casado(a)</option>
                    <option value="Solteiro(a)">Solteiro(a)</option>
                    <option value="Divorciado(a)">Divorciado(a)</option>
                    <option value="União_Estável">União Estável</option>
                </select>
                <br>
                <label for="state" required>Estado:</label>
                <select id="state" name="userState">
                    <!-- Lista padrão que voce rola pra achar oq quer -->
                    <option value="Acre">Acre</option>
                    <option value="Alagoas">Alagoas</option>
                    <option value="Amapá">Amapá</option>
                    <option value="Amazonas">Amazonas</option>
                    <option value="Bahia">Bahia</option>
                    <option value="Ceará">Ceará</option>
                    <option value="DistritoFederal">Distrito Federal</option>
                    <option value="EspiritoSanto">Espirito Santo</option>
                    <option value="Goiás">Goiás</option>
                    <option value="Maranhão">Maranhão</option>
                    <option value="MatoGrossoDoSul">Mato Grosso do Sul</option>
                    <option value="MatoGrosso">Mato Grosso</option>
                    <option value="MinasGerais">Minas Gerais</option>
                    <option value="Pará">Pará</option>
                    <option value="Paraíba">Paraíba</option>
                    <option value="Paraná">Paraná</option>
                    <option value="Pernambuco">Pernambuco</option>
                    <option value="Piauí">Piauí</option>
                    <option value="RioDeJaneiro">Rio de Janeiro</option>
                    <option value="RioGrandeDoNorte">Rio Grande do Norte</option>
                    <option value="RioGrandeDoSul">Rio Grande do Sul</option>
                    <option value="Rondônia">Rondônia</option>
                    <option value="Roraima">Roraima</option>
                    <option value="SantaCatarina">Santa Catarina</option>
                    <option value="SãoPaulo">São Paulo</option>
                    <option value="Sergipe">Sergipe</option>
                    <option value="Tocantins">Tocantins</option>
                </select>
                <br>
                <label for="city">Cidade</label>
                <input type="text" id="city" name="userCity" placeholder="Ex.: Fortaleza" autocomplete="address-level2">
            </fieldset>
            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes sociais:</p>
                <input type="checkbox" name="social" id="instagram" value="instagram">
                <label for="instagram">Instagram</label>
                <br>
                <input type="checkbox" name="social" id="facebook" value="facebook">
                <label for="facebook">Facebook</label>
                <br>
                <input type="checkbox" name="social" id="linkedIn" value="linkedIn">
                <label for="linkedIn">LinkedIn</label>
                <br>
                <input type="checkbox" name="social" id="X" value="X">
                <label for="X">Instagram</label>
                <!-- Checkbox para multiplas escolhas -->
                <!-- Com id eu consigo fazer q ao clicar no label de pra interagir -->
                <br>
                <label for="musicStyle">Estilo Musical Favorito:</label>
                <input list="musicGenre" type="text" name="userMusicStyle" id="musicStyle">
                <!-- datalist serve pra por sugestão num input de texto livre -->
                <!-- passe pro input qual lista ele deve recomendar através de list e tem q ter o mesmo valor q o id da lista -->
                <datalist id="musicGenre">
                    <option value="Rock">
                    <option value="Sertanejo">
                    <option value="Pop">
                    <option value="Funk">
                    <option value="Samba">
                </datalist>
                <br>
                <label for="favColor">Cor Favorita:</label>
                <input type="color" name="userFavColor" id="favColor">
            </fieldset>
            <fieldset>
                <legend>Satisfação</legend>
                <p>Sua opnião:</p>
                <input type="radio" name="userOpinion" value="otima" id="otima">
                <label for="otima">Ótima</label>
                <input type="radio" name="userOpinion" value="boa" id="boa">
                <label for="boa">Boa</label>
                <input type="radio" name="userOpinion" value="regular" id="regular">
                <label for="regular">Regular</label>
                <input type="radio" name="userOpinion" value="ruim" id="ruim">
                <label for="userOpinion">Ruim</label>
                <br>
                <p></p>
                <textarea name="avaliacao" id="avaliacao" placeholder="Deixe um comentário"></textarea>
                <label for="avaliacao"></label>
            </fieldset>
            <button type="submit">Enviar</button>
        </form>
    </section>
    <footer></footer>
</body>

</html>
